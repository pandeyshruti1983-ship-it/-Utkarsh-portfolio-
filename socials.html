<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .navigation {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
        }

        /* Brand logo sizing */
        .brand-logo {
            height: 40px;
            margin-left: 10px;
        }

        /* Navigation links */
        .navigation-link {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .navigation-link:hover {
            color: #ffd700;
        }

        /* Section heading */
        .m-heading {
            font-family: 'Baloo Tamma 2', cursive;
            font-weight: 700;
            color: #2a5298;
        }

        /* Social media buttons */
        .media_link {
            display: block;
            margin: 15px;
            padding: 20px;
            border-radius: 10px;
            font-weight: 600;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* LinkedIn */
        .media_link[href*="linkedin"] {
            background-color: #0077b5;
            color: #fff;
        }

        .media_link[href*="linkedin"]:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(0, 119, 181, 0.5);
        }

        /* Instagram */
        .media_link[href*="instagram"] {
            background: radial-gradient(circle at 30% 107%, #000000 0%, #000000 5%, #000000 45%, #000000 60%, #000000 90%);
            color: #fff;
        }

        .media_link[href*="instagram"]:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(63, 16, 48, 0.5);
        }

        /* GitHub */
        .media_link[href*="github"] {
            background-color: #333;
            color: #fff;
        }

        .media_link[href*="github"]:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(51, 51, 51, 0.5);
        }

        /* YouTube */
        .media_link[href*="youtube"] {
            background-color: #850000;
            color: #fff;
        }

        .media_link[href*="youtube"]:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.5);
        }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Tamma+2:wght@400;500;600;700;800&family=Roboto+Slab:wght@200;400;600;900&display=swap"
        rel="stylesheet" />

    <!-- My CSS -->
    <link rel="stylesheet" href="style.css" />

    <title>Contact US</title>
</head>

<body>
    <header>
        <div class="container-fluid navigation pt-3">
            <div class="row">
                <div class="col-6 d-flex justify-content-start align-items-center">
                    <i class="fas fa-code fa-2x text-warning pb-3"></i>
                    <img src="https://img.freepik.com/premium-vector/logo-cv-company_608024-1114.jpg"
                        alt="brand logo" class="brand-logo">
                    <h4 class="d-inline pl-2 text-white">Coding-Verse</h4>
                </div>
                <div class="col-6 pt-2">
                    <div class="row text-center p-0 d-flex justify-content-end align-items-center">
                        <div class="col-md-3 col-12">
                            <a href="index.html" class="navigation-link">Home</a>
                        </div>
                        <div class="col-md-3 col-12">
                            <a href="projects.html" class="navigation-link">Projects</a>
                        </div>
                        <div class="col-md-3 col-12">
                            <a href="#r" class="navigation-link">Resume</a>
                        </div>
                        <div class="col-md-3 col-12">
                            <a href="socials.html" class="navigation-link">Contact</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section style="height: 100vh;">
        <div id="social-media" class="container-fluid">
            <div class="container text-black py-5">
                <h4 class="text-secondary">Social-Media</h4>
                <h1 class="m-heading">Let's be friends</h1>
                <div class="row pt-5">

                    <!-- LinkedIn -->
                    <a class="col-3 media_link btn text-black" href="https://in.linkedin.com/" target="_blank">
                        <div class="row">
                            <div class="col-6 d-flex justify-content-start">
                                <h3 class="m-0 pt-2 text-black">Linkedin</h3>
                            </div>
                            <div class="col-6 d-flex justify-content-end align-items-center">
                                <i class="fab fa-linkedin fa-2x text-light"></i>
                            </div>
                        </div>
                    </a>

                    <!-- Instagram -->
                    <a class="col-3 media_link btn text-black" href="https://www.instagram.com/" target="_blank">
                        <div class="row">
                            <div class="col-6 d-flex justify-content-start">
                                <h3 class="m-0 pt-2 text-black">Insta</h3>
                            </div>
                            <div class="col-6 d-flex justify-content-end align-items-center">
                                <i class="fab fa-instagram fa-2x text-light"></i>

                    </a>

                    <!-- GitHub -->
                    <a class="col-3 media_link btn text-black" href="https://github.com/pandeyshruti1983-ship-it" target="_blank">

                            <div class="col-6 d-flex justify-content-start">
                                <h3 class="m-0 pt-2 text-black">Github</h3>
                            </div>
                            <div class="col-6 d-flex justify-content-end align-items-center">
                                <i class="fab fa-github fa-2x text-light"></i>
                            </div>
                        </div>
                    </a>

                    <!-- YouTube -->
                    <a class="col-3 media_link btn text-black" href="https://www.youtube.com/" target="_blank">
                        <div class="row">
                            <div class="col-6 d-flex justify-content-start">
                                <h3 class="m-0 pt-2 text-black">YouTube</h3>
                            </div>
                            <div class="col-6 d-flex justify-content-end align-items-center">
                                <i class="fab fa-youtube fa-2x text-light"></i>
                            </div>
                        </div>
                    </a>

                </div>
            </div>
        </div>
    </section>
</body>

</html>
